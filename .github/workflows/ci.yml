name: CI

on:
  push:
  pull_request:

jobs:
  lint-test-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint RUFF="python -m ruff"

      - name: Test
        run: make test PYTHON=python

      - name: Benchmark smoke
        run: >
          PYTHONDONTWRITEBYTECODE=1 python -m learning_to_rank_distillation.benchmark.run_all
          --num-queries 12
          --items-per-query 4
          --student-epochs 1
          --output-dir /tmp/ltrd-artifacts

      - name: Promotion gate smoke
        run: >
          python -m learning_to_rank_distillation.benchmark.promotion_check
          --benchmark-table /tmp/ltrd-artifacts/benchmark_table.json
          --registry-path /tmp/ltrd-artifacts/promotion_ci.sqlite
          --max-ndcg-drop 0.50
          --min-latency-improvement 0.25
